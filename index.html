<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Liseuse — PDF Reader</title>
  <link rel="stylesheet" href="styles.css">
  <!-- PDF.js (ESM) -->
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
  </script>
  <!-- App logic -->
  <script defer src="app.js"></script>
</head>
<body>
  <header class="top-bar">
    <div class="brand">Liseuse</div>
    <button id="open-btn" class="primary-btn">Open PDF</button>
    <input type="file" id="file-input" accept="application/pdf" hidden>
  </header>

  <main id="reader">
    <div id="pages-container"></div>
    <div id="empty-state">
      <div class="logo">L</div>
      <h1>Open a PDF book</h1>
      <p>Tap a word to start reading with a natural system voice.</p>
      <button id="empty-open-btn" class="primary-btn">Choose PDF</button>
    </div>
  </main>

  <footer class="bottom-bar">
    <button id="play-pause-btn" class="circle-btn" disabled>▶</button>
    <button id="stop-btn" class="circle-btn" disabled>■</button>
    <label class="speed-label">
      Speed
      <input type="range" id="speed-slider" min="0.7" max="2.0" step="0.1" value="1.0">
      <span id="speed-display">1.0×</span>
    </label>
    <div id="status-text" class="status-text">No document loaded</div>
  </footer>
</body>
</html>
